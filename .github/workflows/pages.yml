name: Deploy Fabric catalog to GitHub Pages

# Publishes the repo (the index.html visual catalog + all card/template/preview
# files it references) to GitHub Pages on every push to main.
#
# One-time setup: on GitHub go to Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that, every push deploys automatically and the
# catalog is live at https://<owner>.github.io/<repo>/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload repository as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
