<!-- @dsCard group="Colors" viewport="700x210" name="Nightfall — dark theme" subtitle="Warm night earth: loam surfaces, moonlit ink, luminous moss" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-canvas); padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; }
  .surfaces { display: flex; gap: 10px; }
  .surf { flex: 1; height: 58px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); display: flex; align-items: flex-end; padding: 8px; font-family: var(--font-data); font-size: 10px; color: var(--text-muted); }
  .bottom { display: flex; align-items: center; gap: 22px; }
  .ink { display: flex; flex-direction: column; gap: 4px; }
  .strong { font-family: var(--font-display); font-size: 22px; color: var(--text-strong); }
  .muted { font-size: 13px; color: var(--text-muted); }
  .chips { display: flex; gap: 8px; align-items: center; }
  .btn { background: var(--primary); color: var(--text-on-sage); font-family: var(--font-body); font-weight: 600; font-size: 13px; padding: 9px 16px; border-radius: var(--radius-md); white-space: nowrap; }
  .badge { font-family: var(--font-body); font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: var(--radius-pill); }
  .b-moss { background: var(--success-soft); color: var(--on-success-soft); }
  .b-clay { background: var(--accent-warm-soft); color: var(--on-warm-soft); }
  .b-gold { background: var(--accent-gold-soft); color: var(--on-gold-soft); }
</style>
</head>
<body>
  <div class="surfaces">
    <div class="surf" style="background:var(--surface-canvas)">canvas</div>
    <div class="surf" style="background:var(--surface-card)">card</div>
    <div class="surf" style="background:var(--surface-raised)">raised</div>
    <div class="surf" style="background:var(--surface-sunken)">sunken</div>
  </div>
  <div class="bottom">
    <div class="ink">
      <span class="strong">Moonlight on linen</span>
      <span class="muted">Warm dark — never a cold blue-black.</span>
    </div>
    <div class="chips">
      <span class="btn">Begin focus</span>
      <span class="badge b-moss">moss</span>
      <span class="badge b-clay">clay</span>
      <span class="badge b-gold">honey</span>
    </div>
  </div>
</body>
</html>
