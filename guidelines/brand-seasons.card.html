<!-- @dsCard group="Brand" viewport="700x250" name="Seasons" subtitle="A seasonal accent + signature texture, composing with light/dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px 26px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .tile { height: 190px; border-radius: var(--radius-lg); border: 1px solid var(--border-subtle);
    background-color: var(--surface-sunken); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .szn { font-family: var(--font-display); font-size: 23px; color: var(--text-strong); line-height: 1; }
  .spacer { flex: 1; }
  .chip { align-self: flex-start; display: inline-flex; align-items: center; gap: 7px;
    background: var(--season-accent-soft); color: var(--season-on-soft);
    font-family: var(--font-body); font-size: 12px; font-weight: 600;
    padding: 6px 11px; border-radius: var(--radius-pill); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--season-accent); }
  .tex { font-family: var(--font-data); font-size: 10px; letter-spacing: 0.04em; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="tile fabric-weave" data-season="spring">
      <span class="szn">Spring</span>
      <span class="spacer"></span>
      <span class="chip"><span class="dot"></span>sage</span>
      <span class="tex">.fabric-weave</span>
    </div>
    <div class="tile fabric-ribbed" data-season="summer">
      <span class="szn">Summer</span>
      <span class="spacer"></span>
      <span class="chip"><span class="dot"></span>ochre</span>
      <span class="tex">.fabric-ribbed</span>
    </div>
    <div class="tile fabric-felt" data-season="autumn">
      <span class="szn">Autumn</span>
      <span class="spacer"></span>
      <span class="chip"><span class="dot"></span>terracotta</span>
      <span class="tex">.fabric-felt</span>
    </div>
    <div class="tile fabric-frost" data-season="winter">
      <span class="szn">Winter</span>
      <span class="spacer"></span>
      <span class="chip"><span class="dot"></span>marsh</span>
      <span class="tex">.fabric-frost</span>
    </div>
  </div>
</body>
</html>
