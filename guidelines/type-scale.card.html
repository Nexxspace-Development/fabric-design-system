<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Minor-third scale, 11 → 76px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px 32px; }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: 0; }
  .tok { font-family: var(--font-data); font-size: 11px; color: var(--text-faint); width: 116px; flex: none; }
  .samp { font-family: var(--font-display); color: var(--text-strong); line-height: 1.1; white-space: nowrap; }
</style>
</head>
<body>
  <div class="row"><span class="tok">--text-4xl 60</span><span class="samp" style="font-size:46px">Fabric</span></div>
  <div class="row"><span class="tok">--text-3xl 46</span><span class="samp" style="font-size:38px">Made from nature</span></div>
  <div class="row"><span class="tok">--text-2xl 36</span><span class="samp" style="font-size:30px">A page title</span></div>
  <div class="row"><span class="tok">--text-xl 28</span><span class="samp" style="font-size:25px">Section heading</span></div>
  <div class="row"><span class="tok">--text-lg 22</span><span class="samp" style="font-size:21px">Small heading</span></div>
  <div class="row"><span class="tok">--text-base 16</span><span class="samp" style="font-family:var(--font-body);font-size:16px">Body copy sits here</span></div>
  <div class="row"><span class="tok">--text-sm 14</span><span class="samp" style="font-family:var(--font-body);font-size:14px;color:var(--text-muted)">Secondary UI text</span></div>
</body>
</html>
