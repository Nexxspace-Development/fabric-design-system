<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="Soft, organic corners — xs → pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px 28px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 76px; height: 64px; background: var(--sage-100); border: 1.5px solid var(--sage-300); }
  .tok { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="tok">xs · 3</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="tok">sm · 6</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="tok">md · 10</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="tok">lg · 14</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="tok">xl · 20</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="tok">2xl · 28</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:64px"></div><span class="tok">pill</span></div>
  </div>
</body>
</html>
