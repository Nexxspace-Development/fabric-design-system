<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale" subtitle="4px base grid, 1 → 16" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px 28px; }
  .row { display: flex; align-items: center; gap: 14px; padding: 4px 0; }
  .tok { font-family: var(--font-data); font-size: 11px; color: var(--text-faint); width: 96px; flex: none; }
  .bar { height: 14px; background: var(--sage-300); border-radius: 3px; }
  .px { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row"><span class="tok">--space-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><span class="tok">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><span class="tok">--space-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><span class="tok">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><span class="tok">--space-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><span class="tok">--space-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><span class="tok">--space-8</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
  <div class="row"><span class="tok">--space-9</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
</body>
</html>
