<!-- @dsCard group="Colors" viewport="700x150" name="Stone — neutral" subtitle="Warm linen → bark. The backbone neutral." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px 28px; }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .sw { height: 72px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
  .sw span { font-family: var(--font-data); font-size: 10px; }
  .light span { color: rgba(40,35,28,0.55); } .dark span { color: rgba(255,253,248,0.72); }
</style>
</head>
<body>
  <div class="scale">
    <div class="sw light" style="background:var(--stone-50)"><span>50</span></div>
    <div class="sw light" style="background:var(--stone-100)"><span>100</span></div>
    <div class="sw light" style="background:var(--stone-150)"><span>150</span></div>
    <div class="sw light" style="background:var(--stone-200)"><span>200</span></div>
    <div class="sw light" style="background:var(--stone-300)"><span>300</span></div>
    <div class="sw light" style="background:var(--stone-400)"><span>400</span></div>
    <div class="sw dark" style="background:var(--stone-500)"><span>500</span></div>
    <div class="sw dark" style="background:var(--stone-600)"><span>600</span></div>
    <div class="sw dark" style="background:var(--stone-700)"><span>700</span></div>
    <div class="sw dark" style="background:var(--stone-800)"><span>800</span></div>
    <div class="sw dark" style="background:var(--stone-900)"><span>900</span></div>
  </div>
</body>
</html>
