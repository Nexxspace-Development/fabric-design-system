<!-- @dsCard group="Brand" viewport="700x200" name="Texture & motifs" subtitle="Woven paper texture and the mono eyebrow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .weave { background-color: var(--stone-100); height: 200px; display: flex; flex-direction: column; justify-content: center; padding: 0 30px; gap: 8px; }
  .eyebrow { font-family: var(--font-data); font-size: 12px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); }
  .h { font-family: var(--font-display); font-size: 26px; color: var(--text-strong); margin: 0; line-height: 1.1; }
  .note { padding: 0 30px; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
  .note p { font-size: 13px; color: var(--text-muted); margin: 0; line-height: 1.5; }
  .swatch-label { font-family: var(--font-data); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="weave fabric-weave">
    <span class="eyebrow">// Woven canvas</span>
    <h2 class="h">A faint cross-hatch,<br/>like light on cloth</h2>
  </div>
  <div class="note">
    <span class="eyebrow">// Mono eyebrow</span>
    <p>The <code>.fabric-weave</code> utility lays a barely-there textile grid over canvases and heroes. The mono eyebrow — uppercase, tracked, prefixed with <code>//</code> — labels sections without shouting.</p>
    <span class="swatch-label">.fabric-weave · .fabric-eyebrow</span>
  </div>
</body>
</html>
