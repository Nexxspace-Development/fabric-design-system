<!-- @dsCard group="Type" viewport="700x230" name="Display — Newsreader" subtitle="Humanist serif for headlines, hero & quotes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 28px 32px; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .d1 { font-family: var(--font-display); font-size: 60px; font-weight: 400; line-height: 1.05; letter-spacing: -0.02em; color: var(--text-strong); margin: 0; }
  .d2 { font-family: var(--font-display); font-size: 30px; font-weight: 400; color: var(--text-strong); margin: 0; }
  .di { font-family: var(--font-display); font-size: 21px; font-style: italic; font-weight: 300; color: var(--text-muted); margin: 0; }
  .meta { font-family: var(--font-data); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); margin-top: 6px; }
</style>
</head>
<body>
<div class="stack">
  <p class="d1">Made from nature</p>
  <p class="d2">Calm tools for focused work</p>
  <p class="di">“Design that recedes, so the work comes forward.”</p>
  <p class="meta">Newsreader · 300–600 · roman & italic</p>
</div>
</body>
</html>
