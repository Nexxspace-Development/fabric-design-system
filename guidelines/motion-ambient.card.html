<!-- @dsCard group="Motion" viewport="700x220" name="Ambient — Breathing" subtitle="The system's idle heartbeat: a 7.2 s drift loop that keeps a resting page alive without stealing focus" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; }
  body {
    background: var(--surface-canvas);
    padding: 24px 32px;
    font-family: var(--font-sans);
    display: flex;
    flex-direction: column;
    height: 220px;
  }

  .head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 0; }
  .eyebrow { font-family: var(--font-data); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--primary); }
  .card-title { font-family: var(--font-display); font-size: 20px; font-weight: 500; color: var(--text-strong); }

  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  @keyframes breathe-full {
    0%, 100% {
      transform: scale(1);
      box-shadow: 0 0 0 0 color-mix(in srgb, var(--primary) 28%, transparent);
      opacity: 0.55;
    }
    50% {
      transform: scale(1.13);
      box-shadow: 0 0 0 20px color-mix(in srgb, var(--primary) 0%, transparent);
      opacity: 1;
    }
  }

  .orb {
    flex-shrink: 0;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--primary);
    animation: breathe-full var(--duration-ambient, 7200ms) var(--ease-drift, cubic-bezier(0.45,0.05,0.55,0.95)) infinite;
  }

  .annotation { display: flex; flex-direction: column; gap: 8px; }
  .ann-row { display: flex; align-items: baseline; gap: 10px; }
  .ann-label {
    font-family: var(--font-data); font-size: 9.5px; letter-spacing: 0.13em;
    text-transform: uppercase; color: var(--text-faint); width: 54px; flex-shrink: 0;
  }
  .ann-val { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-muted); }
  .ann-sub {
    margin-top: 8px; padding-top: 10px; border-top: 1px solid var(--border-subtle);
    font-family: var(--font-data); font-size: 9px; letter-spacing: 0.07em;
    color: var(--text-faint); line-height: 1.5; max-width: 300px; opacity: 0.75;
  }

  @media (prefers-reduced-motion: reduce) {
    .orb { animation: none; opacity: 0.65; box-shadow: none; }
  }
</style>
</head>
<body>
<div class="head">
  <span class="eyebrow">Motion · Ambient</span>
  <span class="card-title">Breathing</span>
</div>
<div class="stage">
  <div class="orb"></div>
  <div class="annotation">
    <div class="ann-row">
      <span class="ann-label">Duration</span>
      <span class="ann-val">--duration-ambient · 7 200 ms</span>
    </div>
    <div class="ann-row">
      <span class="ann-label">Easing</span>
      <span class="ann-val">--ease-drift</span>
    </div>
    <div class="ann-row">
      <span class="ann-label">Amplitude</span>
      <span class="ann-val">scale 1.0 → 1.13 · opacity 0.55 → 1.0</span>
    </div>
    <div class="ann-sub">
      Use for idle states, focus timers, and background life.<br>
      Never use --duration-ambient for interactive transitions.
    </div>
  </div>
</div>
</body>
</html>
