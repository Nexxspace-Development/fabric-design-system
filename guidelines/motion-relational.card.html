<!-- @dsCard group="Motion" viewport="700x300" name="Relational — Breeze stagger" subtitle="List and grid entries sweep in one by one, like wind crossing a field — never all at once" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; }
  body { background: var(--surface-canvas); padding: 24px; font-family: var(--font-sans); }

  .head { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 18px; }
  .headtxt { flex: 1; }
  .eyebrow { font-family: var(--font-data); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--primary); }
  .card-title { font-family: var(--font-display); font-size: 20px; font-weight: 500; color: var(--text-strong); margin-top: 2px; }

  .replay {
    appearance: none; border: 1px solid var(--border-default); background: var(--surface-card);
    color: var(--text-muted); border-radius: var(--radius-pill);
    font-family: var(--font-data); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 7px 16px; cursor: pointer; flex-shrink: 0;
    transition: background var(--duration-fast) var(--ease-out),
                color var(--duration-fast) var(--ease-out),
                transform var(--duration-slow) var(--ease-settle);
  }
  .replay:hover { background: var(--surface-raised); color: var(--text-strong); }
  .replay:active { transform: scale(0.97); }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .item {
    background: var(--surface-card); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg); padding: 14px 14px;
    display: flex; align-items: center; gap: 12px;
    transition: opacity 340ms var(--ease-settle, cubic-bezier(0.34,1.06,0.64,1)),
                transform 340ms var(--ease-settle, cubic-bezier(0.34,1.06,0.64,1));
  }
  .dot { flex: none; width: 30px; height: 30px; border-radius: var(--radius-sm); }
  .lines { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .line { height: 5px; border-radius: 999px; background: var(--text-faint); opacity: 0.28; }

  .note {
    margin-top: 16px;
    font-family: var(--font-data); font-size: 9.5px; letter-spacing: 0.08em;
    color: var(--text-faint); text-align: center; opacity: 0.7;
  }

  @media (prefers-reduced-motion: reduce) {
    .item { transition: none; opacity: 1 !important; transform: none !important; }
  }
</style>
</head>
<body>
<div class="head">
  <div class="headtxt">
    <div class="eyebrow">Motion · Relational</div>
    <div class="card-title">Breeze stagger</div>
  </div>
  <button class="replay" id="replay">↺ Replay</button>
</div>

<div class="grid" id="grid">
  <div class="item"><div class="dot" style="background:var(--success-soft)"></div><div class="lines"><div class="line" style="width:72%"></div><div class="line" style="width:48%"></div></div></div>
  <div class="item"><div class="dot" style="background:var(--info-soft)"></div><div class="lines"><div class="line" style="width:60%"></div><div class="line" style="width:80%"></div></div></div>
  <div class="item"><div class="dot" style="background:var(--warning-soft)"></div><div class="lines"><div class="line" style="width:85%"></div><div class="line" style="width:55%"></div></div></div>
  <div class="item"><div class="dot" style="background:var(--primary-soft)"></div><div class="lines"><div class="line" style="width:50%"></div><div class="line" style="width:70%"></div></div></div>
  <div class="item"><div class="dot" style="background:var(--danger-soft)"></div><div class="lines"><div class="line" style="width:78%"></div><div class="line" style="width:42%"></div></div></div>
  <div class="item"><div class="dot" style="background:var(--surface-sunken)"></div><div class="lines"><div class="line" style="width:64%"></div><div class="line" style="width:88%"></div></div></div>
</div>

<div class="note">each item: 60 ms stagger · --ease-settle · 340 ms</div>

<script>
  var items = Array.from(document.querySelectorAll('.item'));
  var STAGGER = 60;

  function hide() {
    items.forEach(function(el) {
      el.style.transition = 'none';
      el.style.opacity = '0';
      el.style.transform = 'translateY(12px) scale(0.96)';
    });
  }

  function reveal() {
    items.forEach(function(el, i) {
      setTimeout(function() {
        el.style.transition = '';
        el.style.opacity = '';
        el.style.transform = '';
      }, i * STAGGER);
    });
  }

  document.getElementById('replay').addEventListener('click', function() {
    hide();
    requestAnimationFrame(function() { requestAnimationFrame(reveal); });
  });

  // Auto-play on load
  hide();
  setTimeout(reveal, 220);
</script>
</body>
</html>
