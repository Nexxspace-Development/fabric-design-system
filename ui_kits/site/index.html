<!-- @dsCard group="Website" viewport="1280x760" name="Fabric — landing" subtitle="Marketing site hero & sections" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fabric — Calm tools for focused work</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-canvas); color: var(--text-body); }
  .st-page { overflow-x: hidden; }
  a { color: inherit; }

  /* ---- Nav ---- */
  .st-nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between;
    padding: 16px 40px; background: color-mix(in oklab, var(--surface-canvas) 82%, transparent);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-subtle); }
  .st-nav__brand { display: flex; align-items: center; gap: 9px; text-decoration: none; font-family: var(--font-display); font-size: 21px; font-weight: 500; color: var(--text-strong); }
  .st-nav__links { display: flex; gap: 28px; }
  .st-nav__links a { text-decoration: none; font-size: 14.5px; font-weight: 500; color: var(--text-muted); transition: color var(--duration-fast) var(--ease-out); }
  .st-nav__links a:hover { color: var(--text-strong); }
  .st-nav__actions { display: flex; align-items: center; gap: 8px; }

  /* ---- Hero ---- */
  .st-hero { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 48px; align-items: center;
    padding: 92px 40px 96px; max-width: 1200px; margin: 0 auto; }
  .st-hero__title { font-family: var(--font-display); font-size: 62px; font-weight: 500; line-height: 1.04; letter-spacing: -0.025em;
    color: var(--text-strong); margin: 16px 0 0; max-width: 11ch; }
  .st-hero__sub { font-size: 18px; line-height: 1.6; color: var(--text-muted); max-width: 46ch; margin: 22px 0 0; }
  .st-hero__cta { display: flex; gap: 12px; margin-top: 32px; }
  .st-hero__note { display: flex; align-items: center; gap: 8px; margin-top: 22px; font-size: 13.5px; color: var(--text-faint); }

  .st-preview { width: 100%; }
  .st-preview__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .st-preview__title { font-family: var(--font-display); font-size: 24px; font-weight: 500; color: var(--text-strong); }
  .st-preview__date { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .st-preview__rows { display: flex; flex-direction: column; }
  .st-preview__row { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border-subtle); }
  .st-preview__row:last-child { border-bottom: 0; }
  .st-preview__rowtitle { flex: 1; font-size: 14.5px; color: var(--text-body); }
  .st-preview__row[data-done="true"] .st-preview__rowtitle { color: var(--text-faint); text-decoration: line-through; text-decoration-color: var(--stone-400); }
  .st-preview__est { font-family: var(--font-data); font-size: 12px; color: var(--text-faint); }

  /* ---- Section shared ---- */
  .st-section__head { text-align: center; margin-bottom: 44px; }
  .st-section__title { font-family: var(--font-display); font-size: 40px; font-weight: 500; letter-spacing: -0.02em; color: var(--text-strong); margin: 12px 0 0; }

  /* ---- Features ---- */
  .st-features { padding: 72px 40px; max-width: 1120px; margin: 0 auto; }
  .st-features__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  .st-feature__icon { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px;
    border-radius: var(--radius-lg); background: var(--primary-soft); color: var(--sage-700); margin-bottom: 18px; }
  .st-feature__title { font-family: var(--font-display); font-size: 23px; font-weight: 500; color: var(--text-strong); margin: 0 0 8px; }
  .st-feature__text { font-size: 14.5px; line-height: 1.6; color: var(--text-muted); margin: 0; }

  /* ---- Philosophy (deep band — stays dark in both themes, like a forest at dusk) ---- */
  .st-philo { background-color: var(--stone-900); color: var(--stone-100); text-align: center;
    /* always-dark surface → always use a light fleck so the grain reads */
    --texture-ink: hsl(48 24% 82% / 0.09); --texture-ink-strong: hsl(48 24% 82% / 0.17);
    padding: 96px 40px; display: flex; flex-direction: column; align-items: center; gap: 26px; }
  .st-philo__quote { font-family: var(--font-display); font-size: 34px; font-weight: 300; line-height: 1.34; letter-spacing: -0.01em;
    max-width: 20ch; margin: 0; color: var(--stone-50); }
  .st-philo__by { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--stone-300); }

  /* ---- CTA ---- */
  .st-cta { text-align: center; padding: 92px 40px; }
  .st-cta__title { font-family: var(--font-display); font-size: 48px; font-weight: 500; letter-spacing: -0.02em; color: var(--text-strong); margin: 0; }
  .st-cta__sub { font-size: 17px; color: var(--text-muted); margin: 12px 0 28px; }
  .st-cta__form { display: flex; gap: 10px; justify-content: center; max-width: 440px; margin: 0 auto; }
  .st-cta__form > :first-child { flex: 1; }

  /* ---- Footer ---- */
  .st-foot { display: grid; grid-template-columns: 1.4fr 2fr; gap: 40px; padding: 56px 40px; max-width: 1120px; margin: 0 auto;
    border-top: 1px solid var(--border-subtle); }
  .st-foot__tag { font-size: 14px; color: var(--text-muted); margin: 14px 0 0; }
  .st-foot__cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .st-foot__h { font-family: var(--font-data); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 14px; }
  .st-foot__col a { display: block; text-decoration: none; font-size: 14px; color: var(--text-muted); padding: 5px 0; transition: color var(--duration-fast) var(--ease-out); }
  .st-foot__col a:hover { color: var(--text-strong); }
  .st-foot__fine { grid-column: 1 / -1; font-family: var(--font-data); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); margin-top: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="Site.jsx"></script>
<script type="text/babel">
  const { Site } = window.FabricSite;
  ReactDOM.createRoot(document.getElementById('root')).render(<Site />);
</script>
</body>
</html>
