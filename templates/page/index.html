<!-- @template name="Fabric page" description="Calm starter page — nav, hero, and a content card, on warm paper" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fabric page</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<style>
  body { margin: 0; }
  .pg-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; border-bottom: 1px solid var(--border-subtle); }
  .pg-brand { display: flex; align-items: center; gap: 9px; font-family: var(--font-display); font-size: 21px; font-weight: 500; color: var(--text-strong); }
  .pg-brand-dot { width: 13px; height: 13px; border-radius: 50%; background: var(--primary); }
  .pg-main { max-width: 720px; margin: 0 auto; padding: 88px 32px; }
  .pg-title { font-family: var(--font-display); font-size: 52px; font-weight: 500; line-height: 1.06; letter-spacing: -0.025em; color: var(--text-strong); margin: 14px 0 0; }
  .pg-sub { font-size: 18px; line-height: 1.6; color: var(--text-muted); max-width: 46ch; margin: 20px 0 0; }
  .pg-cta { display: flex; gap: 12px; margin-top: 30px; }
  .pg-card { margin-top: 56px; }
  .pg-card h3 { font-family: var(--font-display); font-weight: 500; margin: 0 0 6px; }
  .pg-card p { margin: 0; color: var(--text-muted); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  window.addEventListener('DOMContentLoaded', () => {
    const NS = window.FabricDesignSystem_7bb975 || {};
    const { Button = (p) => React.createElement('button', p), Card = (p) => React.createElement('div', p), Badge = (p) => React.createElement('span', p) } = NS;

    function Page() {
      return (
        <div>
          <nav className="pg-nav">
            <span className="pg-brand"><span className="pg-brand-dot"></span> Fabric</span>
            <Button variant="secondary" size="sm">Sign in</Button>
          </nav>
          <main className="pg-main">
            <span className="fabric-eyebrow">// New page</span>
            <h1 className="pg-title">Start here, calmly.</h1>
            <p className="pg-sub">This is a Fabric starter page. Replace this copy, keep the quiet. Everything below is built from the design system's tokens and components.</p>
            <div className="pg-cta">
              <Button size="lg">Primary action</Button>
              <Button size="lg" variant="ghost">Secondary</Button>
            </div>
            <Card elevation="raised" padding="lg" className="pg-card">
              <h3>A content card</h3>
              <p>Warm paper, a hairline border, a soft shadow. Compose anything inside.</p>
            </Card>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  });
</script>
</body>
</html>
