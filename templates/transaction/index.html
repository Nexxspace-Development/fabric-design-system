<!-- @template name="Transaction detail" description="Single-transaction receipt — status badge, directional amount, fee breakdown with total rules" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Transaction detail</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<style>
  body { margin: 0; background: var(--surface-canvas); }
  .tx-app { min-height: 100vh; }

  /* ---- top bar ---- */
  .tx-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; border-bottom: var(--border-hairline) solid var(--border-subtle);
    background: var(--surface-card);
  }
  .tx-brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); font-size: 20px; font-weight: 500; color: var(--text-strong); }
  .tx-brand svg { width: 26px; height: 26px; display: block; }
  .tx-top-right { display: flex; align-items: center; gap: 12px; }

  .tx-wrap { max-width: 560px; margin: 0 auto; padding: 32px; }
  .tx-back { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-data); font-size: 12px; letter-spacing: 0.03em; color: var(--text-muted); cursor: pointer; margin-bottom: 18px; }
  .tx-back svg { width: 14px; height: 14px; }

  /* ---- hero ---- */
  .tx-hero { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 6px 0 22px; gap: 6px; }
  .tx-logo {
    width: 60px; height: 60px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 26px; font-weight: 500; color: var(--text-on-color);
    box-shadow: var(--shadow-sm); margin-bottom: 10px;
  }
  .tx-merchant { font-family: var(--font-display); font-size: 21px; font-weight: 500; color: var(--text-strong); line-height: 1.2; }
  .tx-sub { font-family: var(--font-data); font-size: 12px; color: var(--text-muted); letter-spacing: 0.02em; }
  .tx-amount {
    font-family: var(--font-data); font-variant-numeric: tabular-nums lining-nums;
    font-size: 46px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.15; margin: 14px 0 6px;
  }
  .tx-status { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-data); font-size: 12px; font-weight: 500; letter-spacing: 0.03em; padding: 5px 13px; border-radius: var(--radius-pill); }
  .tx-status .dot { width: 7px; height: 7px; border-radius: 50%; }
  .tx-status.done { background: var(--success-soft, var(--sage-100)); color: var(--on-success-soft, var(--sage-700)); }
  .tx-status.done .dot { background: var(--success, var(--sage-500)); }

  /* ---- detail rows ---- */
  .tx-rows { display: flex; flex-direction: column; }
  .tx-row { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding: 13px 0; border-bottom: var(--border-hairline) solid var(--border-subtle); }
  .tx-row:last-child { border-bottom: none; }
  .tx-row .k { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .tx-row .v { font-size: 13.5px; color: var(--text-strong); text-align: right; font-weight: 500; }
  .tx-row .v.mono { font-family: var(--font-data); font-variant-numeric: tabular-nums lining-nums; font-weight: 400; }

  .tx-sec-label { font-family: var(--font-data); font-size: 10px; font-weight: 500; letter-spacing: 0.13em; text-transform: uppercase; color: var(--text-faint); margin: 4px 0 2px; }

  /* ---- receipt breakdown ---- */
  .tx-receipt { margin-top: 4px; }
  .tx-line { display: flex; align-items: baseline; justify-content: space-between; padding: 9px 0; }
  .tx-line .k { font-size: 13px; color: var(--text-muted); }
  .tx-line .n { font-family: var(--font-data); font-variant-numeric: tabular-nums lining-nums; font-size: 13.5px; color: var(--text-body); }
  .tx-line.total { border-top: var(--border-thin) solid var(--fin-rule-strong); margin-top: 4px; padding-top: 13px; }
  .tx-line.total .k { font-family: var(--font-display); font-size: 16px; color: var(--text-strong); }
  .tx-line.total .n { font-size: 17px; font-weight: 600; color: var(--text-strong); }

  /* ---- actions ---- */
  .tx-actions { display: flex; gap: 10px; margin-top: 22px; }
  .tx-actions > * { flex: 1; }

  .tx-note { font-family: var(--font-data); font-size: 10.5px; color: var(--text-faint); line-height: 1.6; margin-top: 18px; letter-spacing: 0.01em; text-align: center; }
  .tx-divider { height: 1px; background: var(--border-subtle); margin: 18px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
(function boot() {
  if (!window.FabricDesignSystem_7bb975 || !document.getElementById('root')) { return setTimeout(boot, 30); }
  const NS = window.FabricDesignSystem_7bb975 || {};
  const Card = NS.Card || ((p) => React.createElement('div', p, p.children));
  const Button = NS.Button || ((p) => React.createElement('button', p, p.children));
  const IconButton = NS.IconButton || ((p) => React.createElement('button', { onClick: p.onClick, 'aria-label': p.label }, p.children));

  const fmt = (n, dp = 2) => Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: dp, maximumFractionDigits: dp });
  // House convention: signed, minus glyph U+2212. A purchase is a debit → negative.
  const signed = (n) => (n < 0 ? '\u2212' : '+') + '$' + fmt(n);
  const dir = (n) => (n > 0 ? 'gain' : n < 0 ? 'loss' : 'flat');

  // ---- a single card purchase ----
  const TX = {
    merchant: 'Patagonia',
    glyph: 'Pa',
    glyphColor: 'var(--marsh-600)',
    category: 'Shopping',
    amount: -184.30,               // total charged to card (debit)
    status: 'Completed',
    date: 'May 30, 2026 · 2:14 PM',
    method: 'Fabric Card •••• 4821',
    auth: 'A7F3-9C20-DD41',
    subtotal: 168.00,
    tax: 14.30,
    shipping: 2.00,
  };

  function Row({ k, v, mono }) {
    return (
      <div className="tx-row">
        <span className="k">{k}</span>
        <span className={'v' + (mono ? ' mono' : '')}>{v}</span>
      </div>
    );
  }

  function App() {
    const [dark, setDark] = React.useState(false);
    React.useEffect(() => { document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light'); }, [dark]);

    return (
      <div className="tx-app">
        <header className="tx-top">
          <span className="tx-brand">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M24 3.5C35.5 12 40 23.5 24 44.5C8 23.5 12.5 12 24 3.5Z" fill="var(--primary)"></path>
              <path d="M24 9V40" stroke="var(--text-on-sage)" strokeWidth="1.6" strokeLinecap="round" opacity="0.82"></path>
            </svg>
            Fabric Invest
          </span>
          <div className="tx-top-right">
            <IconButton variant="ghost" size="sm" label="Toggle theme" onClick={() => setDark(d => !d)}>{dark ? '\u2600' : '\u263E'}</IconButton>
          </div>
        </header>

        <main className="tx-wrap">
          <span className="tx-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6" /></svg>
            Activity
          </span>

          <Card elevation="raised" padding="lg">
            {/* hero */}
            <div className="tx-hero">
              <span className="tx-logo" style={{ background: TX.glyphColor }}>{TX.glyph}</span>
              <div className="tx-merchant">{TX.merchant}</div>
              <div className="tx-sub">{TX.category} · {TX.date}</div>
              <div className="tx-amount" data-fin={dir(TX.amount)}>{signed(TX.amount)}</div>
              <span className="tx-status done">
                <span className="dot"></span> {TX.status}
              </span>
            </div>

            <div className="tx-divider"></div>

            {/* payment meta */}
            <div className="tx-sec-label">Payment</div>
            <div className="tx-rows">
              <Row k="Payment method" v={TX.method} />
              <Row k="Authorization" v={TX.auth} mono />
              <Row k="Posted" v="May 31, 2026" />
            </div>

            <div className="tx-divider"></div>

            {/* receipt breakdown — directionally neutral; this is a purchase total */}
            <div className="tx-sec-label">Receipt</div>
            <div className="tx-receipt">
              <div className="tx-line"><span className="k">Subtotal</span><span className="n">${fmt(TX.subtotal)}</span></div>
              <div className="tx-line"><span className="k">Sales tax</span><span className="n">${fmt(TX.tax)}</span></div>
              <div className="tx-line"><span className="k">Shipping</span><span className="n">${fmt(TX.shipping)}</span></div>
              <div className="tx-line total"><span className="k">Total charged</span><span className="n">${fmt(TX.subtotal + TX.tax + TX.shipping)}</span></div>
            </div>

            {/* actions */}
            <div className="tx-actions">
              <Button variant="outline" size="md">Report a problem</Button>
              <Button variant="primary" size="md">Get receipt</Button>
            </div>

            <p className="tx-note">
              Status uses the <b>evaluative</b> axis (Completed → success); the amount uses the <b>directional</b> axis (a debit → loss). Two meanings of green &amp; red, side by side, without collision.
            </p>
          </Card>
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
