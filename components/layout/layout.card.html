<!-- @dsCard group="Components" viewport="700x300" name="Layout" subtitle="Card, Avatar, Divider" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-canvas); padding: 28px; }
  .lbl { font-family: var(--font-data); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 12px; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 644px; }
  .cardttl { font-family: var(--font-display); font-size: 19px; color: var(--text-strong); margin: 0 0 4px; }
  .cardp { font-size: 13px; color: var(--text-muted); margin: 0; }
  .avs { display: flex; align-items: center; gap: 10px; margin-top: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, Avatar, Divider } = window.FabricDesignSystem_7bb975;
  function Demo() {
    return (
      <div>
        <div className="lbl">Card · elevations</div>
        <div className="cards">
          <Card elevation="flat"><div className="cardttl">Flat</div><p className="cardp">Hairline border, no shadow.</p></Card>
          <Card elevation="raised"><div className="cardttl">Raised</div><p className="cardp">The default paper surface.</p></Card>
          <Card elevation="floating"><div className="cardttl">Floating</div><p className="cardp">Popovers and overlays.</p></Card>
        </div>
        <Divider label="Avatars" />
        <div className="avs">
          <Avatar name="Mara Iversen" size="lg" ring />
          <Avatar name="Theo Lund" size="md" />
          <Avatar name="Ada Okafor" size="sm" />
          <Avatar name="June" size="xs" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
