<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-canvas); padding: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px 40px; align-items: start; max-width: 644px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .lbl { font-family: var(--font-data); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px; }
  .span2 { grid-column: 1 / -1; }
  [data-lucide] { width: 18px; height: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Input, Select, Checkbox, Switch } = window.FabricDesignSystem_7bb975;
  const Ico = ({ n }) => <i data-lucide={n}></i>;

  function Demo() {
    return (
      <div className="grid">
        <div className="span2">
          <div className="lbl">Button · variants</div>
          <div className="row">
            <Button variant="primary">Primary</Button>
            <Button variant="secondary">Secondary</Button>
            <Button variant="soft">Soft</Button>
            <Button variant="ghost">Ghost</Button>
            <Button variant="danger">Delete</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
        </div>
        <div>
          <div className="lbl">Button · sizes & icons</div>
          <div className="row">
            <Button size="sm" leadingIcon={<Ico n="plus" />}>New</Button>
            <Button size="md" leadingIcon={<Ico n="check" />}>Done</Button>
            <Button size="lg" variant="secondary" trailingIcon={<Ico n="arrow-right" />}>Next</Button>
          </div>
        </div>
        <div>
          <div className="lbl">Icon button</div>
          <div className="row">
            <IconButton label="Search" variant="ghost"><Ico n="search" /></IconButton>
            <IconButton label="Add" variant="soft"><Ico n="plus" /></IconButton>
            <IconButton label="More" variant="outline"><Ico n="more-horizontal" /></IconButton>
          </div>
        </div>
        <div className="col">
          <div className="lbl">Input</div>
          <Input label="Project name" placeholder="Morning pages" />
          <Input leadingIcon={<Ico n="search" />} placeholder="Search tasks…" />
          <Input label="Slug" error="Already taken" defaultValue="loom" />
        </div>
        <div className="col">
          <div className="lbl">Select & toggles</div>
          <Select label="Sort by" options={['Recent', 'Priority', 'Name']} />
          <div style={{ height: 4 }}></div>
          <Checkbox label="Remind me at 9am" defaultChecked />
          <Switch label="Focus mode" defaultChecked />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
